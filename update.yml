name: 매일 TQQQ 신호 업데이트

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 매일 밤 10시 UTC = 한국 오전 7시 (평일만)
  workflow_dispatch:           # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install yfinance pandas

      - name: 데이터 업데이트
        run: python fetch_data.py

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: $(date '+%Y-%m-%d') 신호 업데이트"
          git push
